<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gerador de Sensibilidade</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
}
body {
    background: #000;
    color: #fff;
    padding: 15px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><path fill="none" stroke="%23202020" stroke-width="0.3" d="M0,40 C120,0 120,80 240,40 M0,80 C120,40 120,120 240,80 M0,120 C120,80 120,160 240,120 M0,160 C120,120 120,200 240,160 M30,0 C0,30 60,30 30,60 M60,0 C30,30 90,30 60,60 M90,0 C60,30 120,30 90,60 M120,0 C90,30 150,30 120,60"/></svg>');
    background-position: center;
}
/* Título principal */
h1 {
    font-size: 22px;
    text-align: center;
    margin: 20px 0 5px 0;
    font-weight: 600;
}
.subtitle {
    font-size: 13px;
    color: #d0d0d0;
    text-align: center;
    margin-bottom: 25px;
}
/* Abas */
.tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
}
.tab {
    flex: 1;
    padding: 10px 0;
    border: 1px solid #fff;
    background: transparent;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
}
.tab.active {
    background: #fff;
    color: #000;
    font-weight: bold;
}
/* Seletores */
select {
    width: 100%;
    padding: 11px 10px;
    background: #111;
    border: 1px solid #fff;
    color: #fff;
    font-size: 15px;
    margin-bottom: 15px;
    appearance: none;
    background-image: url('data:image/svg+xml;utf8,<svg fill="%23ffffff" viewBox="0 0 24 24" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 10px center;
}
/* Botão Gerar */
#gerarBtn {
    width: 100%;
    padding: 10px 0;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    font-size: 15px;
    margin-bottom: 22px;
    cursor: pointer;
}
/* Área de resultados */
#resultado {
    border: 1px solid #fff;
    padding: 12px;
    background: #111;
}
#resultado p {
    font-size: 15px;
    margin: 4px 0;
}
/* Rodapé */
footer {
    font-size: 11px;
    color: #b0b0b0;
    text-align: center;
    margin-top: 30px;
}
</style>
</head>
<body>

<h1>Sensibilidade / Auxílio</h1>
<p class="subtitle">Configure a sensibilidade para usar</p>

<div class="tabs">
    <button class="tab active" id="tabSensi">Sensi</button>
    <button class="tab" id="tabAux">Auxílio</button>
</div>

<div id="conteudoSensi">
    <select id="marca">
    <option value="">Selecione</option>
    <option value="Samsung">Samsung</option>
    <option value="Apple">Apple</option>
    <option value="Xiaomi">Xiaomi</option>
    <option value="Motorola">Motorola</option>
    <option value="Huawei">Huawei</option>
    <option value="Oppo">Oppo</option>
    <option value="Vivo">Vivo</option>
    <option value="OnePlus">OnePlus</option>
    <option value="Realme">Realme</option>
    <option value="Nokia">Nokia</option>
    <option value="LG">LG</option>
    <option value="Sony">Sony</option>
    <option value="Asus">Asus</option>
    <option value="Lenovo">Lenovo</option>
    <option value="ZTE">ZTE</option>
    <option value="Alcatel">Alcatel</option>
    <option value="Meizu">Meizu</option>
    <option value="Honor">Honor</option>
    <option value="HTC">HTC</option>
    <option value="BlackBerry">BlackBerry</option>
    <option value="Google">Google (Pixel)</option>
    </select>>

    <select id="modelo">
        <option value="">Selecione</option>
    </select>

    <button id="gerarBtn">Gerar</button>

    <div id="resultado">
        <p>Modelo: Galaxy A22</p>
        <p>Geral: 102</p>
        <p>Ponto Vermelho: 108</p>
        <p>Mira 2x: 165</p>
        <p>Mira 4x: 135</p>
        <p>Tamanho do Botão: 47</p>
    </div>
</div>

<div id="conteudoAux" style="display: none;">
    <p style="text-align: center; padding: 40px 10px; font-size: 15px;">Conteúdo em desenvolvimento</p>
</div>

<footer>
    Desenvolvido por @ @nexus.sensix
</footer>

<script>
// Dados dos dispositivos (igual a la foto)
const dispositivos = {
    "Samsung": [
        {nome: "Galaxy A22", geral: 102, ponto: 108, mira2x: 165, mira4x: 135, botao: 47},
        {nome: "Galaxy S23", geral: 98, ponto: 105, mira2x: 160, mira4x: 130, botao: 45},
        {nome: "Galaxy A53", geral: 100, ponto: 106, mira2x: 162, mira4x: 132, botao: 46}
    ],
    "Apple": [
        {nome: "iPhone 14", geral: 95, ponto: 102, mira2x: 155, mira4x: 128, botao: 44}
    ],
    "Xiaomi": [
        {nome: "Redmi Note 11", geral: 103, ponto: 109, mira2x: 166, mira4x: 136, botao: 48}
    ]
};

// Atualizar modelos ao escolher marca
const marcaSel = document.getElementById('marca');
const modeloSel = document.getElementById('modelo');

marcaSel.addEventListener('change', () => {
    const marca = marcaSel.value;
    modeloSel.innerHTML = '<option value="">Selecione</option>';
    
    if(dispositivos[marca]) {
        dispositivos[marca].forEach(mod => {
            const opt = document.createElement('option');
            opt.value = mod.nome;
            opt.textContent = mod.nome;
            modeloSel.appendChild(opt);
        });
    }
});

// Atualizar resultados ao clicar Gerar
const gerarBtn = document.getElementById('gerarBtn');
const resultadoDiv = document.getElementById('resultado');

gerarBtn.addEventListener('click', () => {
    const marca = marcaSel.value;
    const modeloNome = modeloSel.value;

    if(!marca || !modeloNome) {
        alert('Selecione marca e modelo!');
        return;
    }

    const dados = dispositivos[marca].find(m => m.nome === modeloNome);
    resultadoDiv.innerHTML = `
        <p>Modelo: ${dados.nome}</p>
        <p>Geral: ${dados.geral}</p>
        <p>Ponto Vermelho: ${dados.ponto}</p>
        <p>Mira 2x: ${dados.mira2x}</p>
        <p>Mira 4x: ${dados.mira4x}</p>
        <p>Tamanho do Botão: ${dados.botao}</p>
    `;
});

// Alternar abas
const tabSensi = document.getElementById('tabSensi');
const tabAux = document.getElementById('tabAux');
const conteudoSensi = document.getElementById('conteudoSensi');
const conteudoAux = document.getElementById('conteudoAux');

tabSensi.addEventListener('click', () => {
    tabSensi.classList.add('active');
    tabAux.classList.remove('active');
    conteudoSensi.style.display = 'block';
    conteudoAux.style.display = 'none';
});

tabAux.addEventListener('click', () => {
    tabAux.classList.add('active');
    tabSensi.classList.remove('active');
    conteudoAux.style.display = 'block';
    conteudoSensi.style.display = 'none';
});
</script>

</body>
</html>
