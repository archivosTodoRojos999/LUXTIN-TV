<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MOD1F LUXT1N - Modificaciones para tu celular</title>
    <style>
        /* Estilos generales */
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #eee;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor del anuncio */
        #splash {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            text-align: center;
            padding: 0 20px;
            animation: pulseBackground 5s ease-in-out forwards;
            z-index: 10;
        }

        /* Animación de fondo sorpresivo (color y brillo) */
        @keyframes pulseBackground {
            0%, 100% {
                background: linear-gradient(135deg, #ff416c, #ff4b2b);
                filter: brightness(1);
            }
            50% {
                background: linear-gradient(135deg, #1f4037, #99f2c8);
                filter: brightness(1.3);
            }
        }

        /* Contenedor principal del chat */
        #mainApp {
            display: none;
            width: 90%;
            max-width: 600px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,75,43,0.6);
            padding: 20px;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        /* Chat messages */
        #chat {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 15px;
        }

        .message {
            background-color: #ff4b2b;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 15px;
            max-width: 80%;
            font-size: 1rem;
            line-height: 1.4;
            box-shadow: 0 0 8px rgba(255,75,43,0.7);
        }

        .message.bot {
            background-color: #ff7043;
            align-self: flex-start;
        }

        .message.user {
            background-color: #ff3b1f;
            align-self: flex-end;
        }

        /* Input area */
        #inputArea {
            display: flex;
            gap: 10px;
        }

        #deviceInput {
            flex-grow: 1;
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 0 8px rgba(255,75,43,0.5);
            background-color: #2a2a2a;
            color: white;
        }

        #sendBtn {
            background-color: #ff4b2b;
            border: none;
            padding: 0 25px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,75,43,0.9);
            transition: background-color 0.3s ease;
        }

        #sendBtn:hover {
            background-color: #ff6f57;
        }

        /* Scrollbar styling */
        #chat::-webkit-scrollbar {
            width: 8px;
        }
        #chat::-webkit-scrollbar-thumb {
            background-color: #ff4b2b;
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            #splash {
                font-size: 1.8rem;
            }
            #mainApp {
                height: 90vh;
            }
        }
    </style>
</head>
<body>

<div id="splash">
    TUS MEJORES MODIFICACIONES PARA TU CELULAR
</div>

<div id="mainApp">
    <div id="chat">
        <div class="message bot">¡Hola! 🌟 Soy MOD1F LUXT1N. Escribe el modelo y la marca de tu celular para recibir tu modificación personalizada para Free Fire.</div>
    </div>
    <div id="inputArea">
        <input type="text" id="deviceInput" placeholder="Ejemplo: Xiaomi Redmi Note 10" />
        <button id="sendBtn">Enviar</button>
    </div>
</div>

<script>
    const splash = document.getElementById('splash');
    const mainApp = document.getElementById('mainApp');
    const chat = document.getElementById('chat');
    const input = document.getElementById('deviceInput');
    const sendBtn = document.getElementById('sendBtn');

    // Modificaciones predefinidas con instrucciones y sensibilidad para ejemplo
    const modifications = {
        'xiaomi redmi note 10': {
            steps: [
                "1. Abre la configuración del juego Free Fire.",
                "2. Ve a la sección de Sensibilidad.",
                "3. Ajusta la sensibilidad de la cámara a 85.",
                "4. Ajusta la sensibilidad del general a 90.",
                "5. Activa la opción 'Mejorar puntería' en las configuraciones avanzadas.",
                "6. Instala el MOD1F LUXT1N en modo seguro (usa solo recursos mínimos).",
                "7. Reinicia el juego para aplicar los cambios."
            ],
            sensitivity: {
                general: 90,
                red_dot: 85,
                2x_scope: 80,
                4x_scope: 75,
                sniper: 70
            }
        },
        'samsung galaxy s20': {
            steps: [
                "1. Abre Free Fire y entra a Configuración.",
                "2. Selecciona Sensibilidad y coloca cámara en 88.",
                "3. Ajusta sensibilidad general a 92 para mejor control.",
                "4. Activa la opción 'Mejorar puntería automática'.",
                "5. Aplica MOD1F LUXT1N siguiendo la guía interna.",
                "6. Reinicia el dispositivo y el juego para asegurar la efectividad."
            ],
            sensitivity: {
                general: 92,
                red_dot: 87,
                2x_scope: 82,
                4x_scope: 78,
                sniper: 72
            }
        }
        // Puedes agregar más modelos aquí
    };

    // Función para añadir mensajes al chat
    function addMessage(text, sender = 'bot') {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.textContent = text;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    // Función para mostrar modificación paso a paso y sensibilidad
    function showModification(device) {
        const lowerDevice = device.toLowerCase();
        if (modifications[lowerDevice]) {
            const mod = modifications[lowerDevice];
            addMessage(`Aquí está tu modificación personalizada MOD1F LUXT1N para tu ${device}:`, 'bot');

            // Mostrar pasos uno por uno con pausa
            let stepIndex = 0;
            function showNextStep() {
                if(stepIndex < mod.steps.length) {
                    addMessage(mod.steps[stepIndex], 'bot');
                    stepIndex++;
                    setTimeout(showNextStep, 3000);
                } else {
                    // Mostrar sensibilidad recomendada
                    const s = mod.sensitivity;
                    let sensText = "Sensibilidad recomendada para Free Fire:\n";
                    sensText += `- General: ${s.general}\n`;
                    sensText += `- Mira roja: ${s.red_dot}\n`;
                    sensText += `- Mira 2x: ${s['2x_scope']}\n`;
                    sensText += `- Mira 4x: ${s['4x_scope']}\n`;
                    sensText += `- Mira francotirador: ${s.sniper}\n`;
                    sensText += "\nCon esta configuración, tendrás mayor probabilidad de pegar más rojos y ser imparable.";
                    addMessage(sensText, 'bot');
                }
            }
            showNextStep();
        } else {
            addMessage("Lo siento, aún no tengo una modificación para ese modelo. Pero pronto la tendremos disponible. 😉", 'bot');
        }
    }

    // Evento para enviar el input
    sendBtn.addEventListener('click', () => {
        const device = input.value.trim();
        if(device === '') return;
        addMessage(device, 'user');
        input.value = '';
        showModification(device);
    });

    input.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendBtn.click();
    });

    // Mostrar la app principal tras 5 segundos y ocultar splash
    setTimeout(() => {
        splash.style.display = 'none';
        mainApp.style.display = 'flex';
        input.focus();
    }, 5000);
</script>

</body>
</html>
