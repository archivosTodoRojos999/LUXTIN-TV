<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulación Hacker</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #00ff00;
            font-family: Consolas, monospace;
            overflow: hidden;
        }
        #terminal {
            padding: 15px;
            height: 100vh;
            overflow: auto;
            white-space: pre-wrap;
        }
        #input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: none;
            outline: none;
            color: #00ff00;
            font-size: 18px;
            border-top: 1px solid #00ff00;
        }
        .window {
            position: absolute;
            width: 250px;
            height: 150px;
            border: 1px solid #00ff00;
            background: #050505;
            color: #00ff00;
            padding: 10px;
            box-shadow: 0 0 12px #00ff00;
        }
        .close {
            position: absolute;
            right: 8px;
            top: 2px;
            cursor: pointer;
            font-weight: bold;
        }
        .matrix {
            font-size: 10px;
            line-height: 10px;
        }
    </style>
</head>
<body>

    <div id="terminal"></div>
    <input id="input" placeholder="Escribe un comando...">

    <script>
        const terminal = document.getElementById("terminal");
        const input = document.getElementById("input");

        function escribir(texto, i = 0) {
            if (i < texto.length) {
                terminal.innerHTML += texto[i];
                terminal.scrollTop = terminal.scrollHeight;
                setTimeout(() => escribir(texto, i + 1), 20);
            }
        }

        function linea(t) {
            escribir(t + "\n");
        }

        function ventana(titulo, contenido, x, y) {
            let w = document.createElement("div");
            w.className = "window";
            w.style.left = x + "px";
            w.style.top = y + "px";

            w.innerHTML =
                "<div class='close'>✖</div><b>" + titulo +
                "</b><hr style='border-color:#00ff00'>" + contenido;

            w.querySelector(".close").onclick = () => w.remove();

            document.body.appendChild(w);
        }

        function efecto(nombre) {
            terminal.innerHTML = "";
            let texto =
                `> Iniciando sistema internacional...\n
> Ejecutando comando: ${nombre}\n
> Conexión a red global...
> Analizando objetivo...
> Desencriptando protocolos...
> Acceso confirmado.
> Operación ficticia completada.\n`;

            escribir(texto);

            setTimeout(() => {
                ventana(
                    "Ubicación Internacional",
                    "Latitud: 12.345678<br>Longitud: 98.765432<br>Estado: Conexión simulada",
                    30, 50);
            }, 1800);

            setTimeout(() => {
                let m = "";
                for (let i = 0; i < 180; i++)
                    m += Math.random() > 0.5 ? "1" : "0";

                ventana(
                    "Matrix",
                    "<div class='matrix'>" + m.replace(/(.{30})/g, "$1<br>") + "</div>",
                    350, 150);
            }, 2500);

            setTimeout(() => {
                ventana(
                    "Estado",
                    "Proceso internacional simulado completado.",
                    650, 80);
            }, 3200);
        }

        input.addEventListener("keydown", e => {
            if (e.key != "Enter") return;

            let c = input.value.trim().toLowerCase();
            input.value = "";

            switch (c) {
                case "red global":
                    efecto("RED GLOBAL");
                    break;
                case "sistema":
                    efecto("SISTEMA");
                    break;
                case "protocolo":
                    efecto("PROTOCOLO");
                    break;
                default:
                    linea("> Comando desconocido.");
            }
        });
    </script>
</body>
</html>
