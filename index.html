<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINI TALENTO 777 - GENERADOR</title>

    <!-- 🛡️ PROTECCIÓN -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .oculto { display: none !important; }
        .centrar { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        input, button { padding: 12px 15px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; width: 100%; max-width: 350px; }
        button { background: #ff0000; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ff3333; }
        h1, h2 { text-align: center; margin-bottom: 15px; }
        .aviso { color: #ff0000; font-weight: bold; text-align: center; margin: 10px 0; }
    </style>

    <script>
        // 🔒 CONFIGURACIÓN DE ACCESOS - MODIFICÁ ACÁ TUS DATOS
        const CLAVE_PREMIUM = "77772233";
        // ✅ SOLO LOS CORREOS QUE PONGAS ACÁ PODRÁN INGRESAR
        const CORREOS_PERMITIDOS = [
            "lucianosala269@gmail.com",    // Tu correo
            "amigo@correo.com"             // Correo de tu amigo
            // Agregá más si querés así: , "otro@correo.com"
        ];
        let correoAprobado = false;

        // 🔊 SONIDOS
        function sonidoClick() { document.getElementById('sClick').cloneNode().play(); }
        function sonidoTecla() { document.getElementById('sTecla').cloneNode().play(); }

        // 📧 VERIFICAR CORREO
        function verificarCorreo() {
            sonidoClick();
            const correo = document.getElementById('correoIngreso').value.trim().toLowerCase();
            if (CORREOS_PERMITIDOS.includes(correo)) {
                correoAprobado = true;
                document.getElementById('seccionCorreo').classList.add('oculto');
                document.getElementById('seccionClave').classList.remove('oculto');
            } else {
                document.getElementById('mensajeAviso').textContent = "❌ CORREO NO AUTORIZADO";
            }
        }

        // 🔑 VERIFICAR CLAVE
        function verificarClave() {
            sonidoClick();
            if (!correoAprobado) return;
            const clave = document.getElementById('clavePremium').value.trim();
            if (clave === CLAVE_PREMIUM) {
                document.getElementById('accesoPremium').classList.add('oculto');
                document.getElementById('contenidoPremium').classList.remove('oculto');
            } else {
                document.getElementById('mensajeAviso').textContent = "❌ CLAVE INCORRECTA";
            }
        }

        // SONIDO AL ESCRIBIR
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', sonidoTecla);
            });
        });
    </script>
</head>
<body>

    <!-- 🔊 ARCHIVOS DE SONIDO (NO TOCAR) -->
    <audio id="sClick" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+P1+vR/4A" type="audio/wav">
    
    <audio id="sTecla" preload="auto">
        <source src="data:audio/wav;base64,UklGRigGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ4GAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+P1+vR/4A" type="audio/wav">
    

    <!-- 🎬 PANTALLA DE ACCESO PREMIUM -->
    <div id="accesoPremium" class="centrar">
        <h1>🔒 ACCESO PREMIUM</h1>

        <!-- PASO 1: PEDIR CORREO -->
        <div id="seccionCorreo">
            <h2>Poné tu correo autorizado</h2>
            <input type="email" id="correoIngreso" placeholder="ejemplo@correo.com" required>
            <button onclick="verificarCorreo()">✅ CONFIRMAR CORREO</button>
        </div>

        <!-- PASO 2: PEDIR CLAVE (SOLO SI CORREO ES CORRECTO) -->
        <div id="seccionClave" class="oculto">
            <h2>Ahora poné tu clave</h2>
            <input type="password" id="clavePremium" placeholder="Tu clave de acceso" required>
            <button onclick="verificarClave()">🔓 DESBLOQUEAR</button>
        </div>

        <div id="mensajeAviso" class="aviso"></div>
    </div>

    <!-- ✅ LO QUE SE VE CUANDO YA INGRESASTE -->
    <div id="contenidoPremium" class="oculto centrar">
        <h1>✅ BIENVENIDO A MINI TALENTO 777</h1>
        <p style="margin: 20px 0; text-align:center;">Acá está todo tu generador y funciones premium listas para usar</p>
        <!-- Acá seguís agregando todo lo demás del generador que ya tenías -->
    </div>

</body>
</html>
